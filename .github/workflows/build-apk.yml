name: Build APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"
          channel: stable
          cache: true

      - name: Restore platform folders (android/ios) if missing
        run: |
          if [ ! -d android ] || [ ! -d ios ]; then
            echo "Generating platform folders via 'flutter create .'"
            flutter create --platforms=android,ios --org com.botflow --project-name bot_flow_builder .
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bot-flow-builder-apk
          path: build/app/outputs/flutter-apk/app-release.apk
